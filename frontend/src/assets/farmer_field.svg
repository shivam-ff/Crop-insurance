<svg width="960" height="560" viewBox="0 0 960 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E8FFF5"/>
      <stop offset="1" stop-color="#F6FBF6"/>
    </linearGradient>
    <linearGradient id="field" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#BBF7D0"/>
      <stop offset="1" stop-color="#A7F3D0"/>
    </linearGradient>
    <linearGradient id="hill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#86EFAC"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
  </defs>

  <!-- sky -->
  <rect x="0" y="0" width="960" height="560" fill="url(#sky)"/>

  <!-- sun -->
  <circle cx="780" cy="130" r="60" fill="#FDE68A"/>
  <circle cx="780" cy="130" r="88" fill="#FDE68A" opacity="0.35"/>

  <!-- hills -->
  <path d="M0 300C150 240 260 250 370 290C490 335 570 345 690 300C820 250 900 260 960 290V560H0V300Z" fill="url(#hill)" opacity="0.75"/>
  <path d="M0 330C140 290 260 295 360 330C510 385 620 400 760 350C860 315 920 320 960 338V560H0V330Z" fill="#22C55E" opacity="0.35"/>

  <!-- field stripes -->
  <path d="M0 380C190 330 330 330 480 380C640 435 780 450 960 410V560H0V380Z" fill="url(#field)"/>
  <path d="M0 430C190 385 330 385 480 430C640 485 780 500 960 465" stroke="#16A34A" stroke-width="22" opacity="0.20"/>
  <path d="M0 470C190 430 330 430 480 470C640 520 780 535 960 505" stroke="#15803D" stroke-width="18" opacity="0.18"/>

  <!-- simple farmer -->
  <g transform="translate(160,260)">
    <circle cx="88" cy="64" r="28" fill="#FDBA74"/>
    <path d="M60 55C82 30 108 30 128 56C110 62 90 66 60 55Z" fill="#92400E" opacity="0.9"/>
    <path d="M74 90C102 96 120 96 146 88C144 112 128 138 110 152H84C70 138 60 114 74 90Z" fill="#166534"/>
    <rect x="72" y="150" width="26" height="56" rx="10" fill="#14532D"/>
    <rect x="110" y="150" width="26" height="56" rx="10" fill="#14532D"/>
    <path d="M55 120C78 130 98 130 124 120" stroke="#052E16" stroke-width="10" stroke-linecap="round"/>
    <!-- scarf -->
    <path d="M76 110C92 102 116 102 132 110C126 126 116 132 104 132C92 132 82 126 76 110Z" fill="#F59E0B" opacity="0.85"/>
  </g>

  <!-- label -->
  <g opacity="0.7">
    <rect x="36" y="36" width="310" height="56" rx="16" fill="#FFFFFF"/>
    <text x="58" y="72" font-family="ui-sans-serif,system-ui" font-size="22" fill="#14532D">Krishi Suraksha</text>
  </g>
</svg>

